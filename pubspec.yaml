name: nevero_app
description: Control de inventario y ventas para nevero tradicional
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  fl_chart: ^0.68.0
  intl: ^0.19.0
  uuid: ^4.3.3
  google_fonts: ^6.2.1
  iconsax: ^0.0.8
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  supabase_flutter: ^2.6.0
  flutter_bloc: ^8.1.3
  go_router: ^14.3.0
  get_it: ^7.6.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
